<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED MART | Premium Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo" onclick="resetSearch()">MED MART</div>
            <div class="search-wrapper">
                <div class="search-bar">
                    <input type="text" id="main-search" placeholder="Search..." autocomplete="off">
                    <i class="fas fa-times" id="clear-search" onclick="resetSearch()"></i>
                    <button id="search-trigger"><i class="fas fa-search"></i></button>
                </div>
                <div id="search-suggestions"></div>
            </div>
            <div></div> </div>
    </header>

    <nav class="beauty-nav">
        <ul>
            <li><a href="#skin-care-sec" class="nav-link" data-target="skin-care-sec">SKIN CARE</a></li>
            <li><a href="#k-beauty-sec" class="nav-link" data-target="k-beauty-sec">K-BEAUTY</a></li>
        </ul>
    </nav>

    <div id="no-results">Nothing found! Try a different keyword.</div>

    <div class="content-wrapper">
        <section id="skin-care-sec" class="category-section" data-cat-name="SKIN CARE">
            <h2 class="category-title">SKIN CARE</h2>
            <div class="scroll-wrapper">
                <button class="scroll-btn left" onclick="sideScroll('sc-1', 'left')"><i class="fas fa-chevron-left"></i></button>
                <div id="sc-1" class="horizontal-scroll-container"></div>
                <button class="scroll-btn right" onclick="sideScroll('sc-1', 'right')"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <section id="k-beauty-sec" class="category-section" data-cat-name="K-BEAUTY">
            <h2 class="category-title">K-BEAUTY</h2>
            <div class="scroll-wrapper">
                <button class="scroll-btn left" onclick="sideScroll('sc-2', 'left')"><i class="fas fa-chevron-left"></i></button>
                <div id="sc-2" class="horizontal-scroll-container"></div>
                <button class="scroll-btn right" onclick="sideScroll('sc-2', 'right')"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <section id="body-care-sec" class="category-section" data-cat-name="BODY CARE">
    <h2 class="category-title">BODY CARE</h2>
    <div class="scroll-wrapper">
        <button class="scroll-btn left" onclick="sideScroll('sc-3', 'left')"><i class="fas fa-chevron-left"></i></button>
        <div id="sc-3" class="horizontal-scroll-container">
            </div>
        <button class="scroll-btn right" onclick="sideScroll('sc-3', 'right')"><i class="fas fa-chevron-right"></i></button>
    </div>
</section>

    </div>

    <script src="script.js"></script>
</body>
</html>
