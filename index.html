<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED MART | Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">MED MART</div>
            <div class="search-wrapper">
                <div class="search-bar">
                    <input type="text" id="main-search" placeholder="Search...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>
    </header>

    <nav class="beauty-nav">
        <ul>
            <li><a href="#" class="nav-link active-tab" data-target="sc-sec">SKIN CARE</a></li>
            <li><a href="#" class="nav-link" data-target="kb-sec">K-BEAUTY</a></li>
            <li><a href="#" class="nav-link" data-target="bc-sec">BODY CARE</a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <section id="sc-sec" class="category-section">
            <h2 style="color:var(--primary); margin-left:20px; font-family:'Cinzel';">SKIN CARE</h2>
            <div id="sc-container" class="horizontal-scroll-container"></div>
        </section>
        <section id="kb-sec" class="category-section">
            <h2 style="color:var(--primary); margin-left:20px; font-family:'Cinzel';">K-BEAUTY</h2>
            <div id="kb-container" class="horizontal-scroll-container"></div>
        </section>
        <section id="bc-sec" class="category-section">
            <h2 style="color:var(--primary); margin-left:20px; font-family:'Cinzel';">BODY CARE</h2>
            <div id="bc-container" class="horizontal-scroll-container"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
