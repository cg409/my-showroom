<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med Hub | Premium Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>MED HUB</h1></header>

    <main class="product-container">
        <div class="card-wrapper">
            <div class="product-card" onclick="toggleExpand(this)">
                <div class="card-image"><img src="https://images.unsplash.com/photo-1591488320449-011701bb6704?w=400"></div>
                <div class="card-details">
                    <h3>NVIDIA GTX 970</h3>
                    <p class="price">Rs. 35,000</p>
                </div>
                <div class="expanded-info">
                    <p class="description">Best 1080p gaming performance.</p>
                    <a href="#" class="more-btn">More Details</a>
                </div>
            </div>
        </div>
        </main>

    <script src="script.js"></script>
</body>
</html>
