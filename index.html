<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED HUB | Premium Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">MED HUB</div>
            <div class="search-bar">
                <input type="text" placeholder="Search premium products...">
                <button><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <nav class="beauty-nav">
        <ul>
            <li><a href="#skin-care" onclick="smoothScroll(event, 'skin-care')">SKIN CARE</a></li>
            <li><a href="#k-beauty" onclick="smoothScroll(event, 'k-beauty')">K-BEAUTY</a></li>
            <li><a href="#">MAKEUP</a></li>
            <li><a href="#">NEW ARRIVALS</a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <section id="skin-care" class="category-section">
            <h2 class="category-title">SKIN CARE</h2>
            <div class="horizontal-scroll-container">
                <div class="card-wrapper">
                    <div class="product-card" onclick="toggleExpand(event, this)">
                        <div class="card-image"><img src="https://images.unsplash.com/photo-1617897903246-719242758050?w=400"></div>
                        <div class="card-details">
                            <h3>Hyaluronic Acid</h3>
                            <p class="price">Rs. 5,200</p>
                            <div class="expanded-info">
                                <p class="description">Premium hydrating serum for deep skin moisture and glow.</p>
                                <a href="#" class="more-btn">Details</a>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
        </section>

        <section id="k-beauty" class="category-section">
            <h2 class="category-title">K-BEAUTY</h2>
            <div class="horizontal-scroll-container">
                <div class="card-wrapper">
                    <div class="product-card" onclick="toggleExpand(event, this)">
                        <div class="card-image"><img src="https://images.unsplash.com/photo-1612817288484-6f916006741a?w=400"></div>
                        <div class="card-details">
                            <h3>Glow Serum (K)</h3>
                            <p class="price">Rs. 6,800</p>
                            <div class="expanded-info">
                                <p class="description">Authentic Korean formula for instant skin brightening.</p>
                                <a href="#" class="more-btn">Details</a>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
