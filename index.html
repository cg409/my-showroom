<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED MART | Premium Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo" onclick="resetSearch()">MED MART</div>
            <div class="search-wrapper">
                <div class="search-bar">
                    <input type="text" id="main-search" placeholder="Search product..." autocomplete="off">
                    <i class="fas fa-times" id="clear-search" onclick="resetSearch()"></i>
                    <button id="search-trigger"><i class="fas fa-search"></i></button>
                </div>
                <div id="search-suggestions"></div>
            </div>
            <div></div> 
        </div>
    </header>

    <div class="hero-slider">
        <div class="slides" id="hero-slides">
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?w=1200" alt="Banner 1">
                <div class="slide-text"><h2>Premium Skin Care</h2><p>Experience the luxury of nature.</p></div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1556228720-195a672e8a03?w=1200" alt="Banner 2">
                <div class="slide-text"><h2>K-Beauty Secrets</h2><p>Imported directly from Korea.</p></div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1612817288484-6f916006741a?w=1200" alt="Banner 3">
                <div class="slide-text"><h2>Full Body Glow</h2><p>Nourish your skin everyday.</p></div>
            </div>
        </div>
    </div>

    <nav class="beauty-nav">
        <ul>
            <li><a href="#sc-sec" class="nav-link" data-target="sc-sec">SKIN CARE</a></li>
            <li><a href="#kb-sec" class="nav-link" data-target="kb-sec">K-BEAUTY</a></li>
            <li><a href="#bc-sec" class="nav-link" data-target="bc-sec">BODY CARE</a></li>
        </ul>
    </nav>

    <div id="no-results">Product not found. Try another keyword!</div>

    <div class="content-wrapper">
        <section id="sc-sec" class="category-section" data-cat-name="SKIN CARE">
            <h2 class="category-title">SKIN CARE</h2>
            <div class="scroll-wrapper">
                <button class="scroll-btn left" onclick="sideScroll('sc-container', 'left')"><i class="fas fa-chevron-left"></i></button>
                <div id="sc-container" class="horizontal-scroll-container"></div>
                <button class="scroll-btn right" onclick="sideScroll('sc-container', 'right')"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <section id="kb-sec" class="category-section" data-cat-name="K-BEAUTY">
            <h2 class="category-title">K-BEAUTY</h2>
            <div class="scroll-wrapper">
                <button class="scroll-btn left" onclick="sideScroll('kb-container', 'left')"><i class="fas fa-chevron-left"></i></button>
                <div id="kb-container" class="horizontal-scroll-container"></div>
                <button class="scroll-btn right" onclick="sideScroll('kb-container', 'right')"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <section id="bc-sec" class="category-section" data-cat-name="BODY CARE">
            <h2 class="category-title">BODY CARE</h2>
            <div class="scroll-wrapper">
                <button class="scroll-btn left" onclick="sideScroll('bc-container', 'left')"><i class="fas fa-chevron-left"></i></button>
                <div id="bc-container" class="horizontal-scroll-container"></div>
                <button class="scroll-btn right" onclick="sideScroll('bc-container', 'right')"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
