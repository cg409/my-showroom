<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med Hub | Premium Tech Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MED HUB</h1>
        <nav class="navbar">
            <a href="#" class="nav-link active">Home</a>
            <a href="#" class="nav-link">Social</a>
            <a href="#" class="nav-link">About Us</a>
        </nav>
    </header>

    <main class="product-container">

        <div class="card-wrapper">
            <div class="product-card" onclick="toggleExpand(this)">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1591488320449-011701bb6704?w=400" alt="GPU">
                </div>
                <div class="card-details">
                    <h3>NVIDIA GTX 970 - 4GB Gaming Edition</h3>
                    <p class="price">Rs. 35,000</p>
                </div>
                <div class="expanded-info">
                    <p class="description">හොඳම තත්වයේ පවතින Graphics Card එකකි. 1080p gaming සඳහා ඉතා සුදුසුයි.</p>
                    <a href="details.html" class="more-btn">More Details</a>
                </div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="product-card" onclick="toggleExpand(this)">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758?w=400" alt="CPU">
                </div>
                <div class="card-details">
                    <h3>Intel i7 4790K</h3>
                    <p class="price">Rs. 25,000</p>
                </div>
                <div class="expanded-info">
                    <p class="description">4.4GHz Turbo boost speed. Legend in gaming performance.</p>
                    <a href="details.html" class="more-btn">More Details</a>
                </div>
            </div>
        </div>

        </main>

    <script src="script.js"></script>
</body>
</html>
